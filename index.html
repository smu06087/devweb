<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프리미엄 로또 & 동물상 AI 테스트</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
  <!-- AI Model Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <div class="background-texture"></div>
  
  <nav class="navbar">
    <div class="nav-content">
      <div class="nav-logo">LOTTO <span class="highlight">G</span></div>
      <div class="nav-links">
        <a href="#lotto-section" class="nav-link">로또생성</a>
        <a href="#ai-section" class="nav-link">동물상테스트</a>
        <a href="#inquiry-section" class="nav-link">제휴문의</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <!-- Lotto Generator Section -->
    <section id="lotto-section" class="scroll-offset">
      <header class="header">
        <h1>LOTTO <span class="highlight">GENERATOR</span></h1>
        <p>당신의 행운을 확인해보세요</p>
      </header>
      
      <div class="ball-container-wrapper">
        <div id="ball-container" class="ball-container">
          <div class="placeholder">번호를 생성해주세요</div>
        </div>
      </div>

      <div class="controls">
        <button id="generate-btn" class="generate-btn">
          <span class="btn-text">번호 생성하기</span>
          <div class="btn-glow"></div>
        </button>
      </div>
    </section>

    <div class="divider"></div>

    <!-- Animal AI Test Section -->
    <section id="ai-section" class="scroll-offset">
      <header class="header">
        <h2>동물상 <span class="highlight">AI 테스트</span></h2>
        <p>사진을 업로드하여 닮은 동물을 확인해보세요!</p>
      </header>

      <div class="ai-test-wrapper">
        <div class="image-upload-area">
          <input type="file" id="image-upload" accept="image/*" hidden>
          <label for="image-upload" id="upload-label" class="ai-btn">
            <span class="btn-text">사진 업로드하기</span>
            <div class="btn-glow"></div>
          </label>
        </div>

        <div id="image-preview-container" class="image-preview-container">
          <img id="image-preview" src="" alt="사진 미리보기" style="display: none;">
          <div id="preview-placeholder" class="preview-placeholder">사진을 선택해주세요</div>
        </div>
        
        <div id="label-container" class="label-container">
          <!-- AI results will appear here -->
        </div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- Partnership Inquiry Section -->
    <section id="inquiry-section" class="scroll-offset">
      <header class="header">
        <h2>제휴 <span class="highlight">문의</span></h2>
        <p>비즈니스 파트너십을 제안해주세요</p>
      </header>

      <form action="https://formspree.io/f/mwvrgwea" method="POST" class="inquiry-form">
        <div class="form-group">
          <label for="name">성함 / 업체명</label>
          <input type="text" id="name" name="name" placeholder="홍길동" required>
        </div>
        
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
          <label for="subject">문의 제목</label>
          <input type="text" id="subject" name="subject" placeholder="제휴 제안" required>
        </div>

        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" placeholder="상세 내용을 입력해주세요" required></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <span class="btn-text">제안 보내기</span>
          <div class="btn-glow"></div>
        </button>
      </form>
    </section>
  </main>
  <script defer type="module" src="/main.js"></script>
</body>
</html>
